worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$body_bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_addr":"$upstream_addr"'
    '}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  keepalive_timeout 65;

  # ── Rate limiting ─────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=upload_limit:10m rate=5r/s;

  # ── Gzip ──────────────────────────────────────────────────────
  gzip on;
  gzip_types text/plain application/json application/javascript text/css;

  # ── Upstream definitions ──────────────────────────────────────
  upstream backend {
    server backend:3000;
    keepalive 16;
  }

  upstream minio {
    server minio:9000;
    keepalive 8;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── API routes → Backend ───────────────────────────────────
    location /api/ {
      limit_req zone=api_limit burst=20 nodelay;

      proxy_pass         http://backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";

      # Upload endpoint gets more time
      location /api/upload-file {
        limit_req zone=upload_limit burst=5 nodelay;
        proxy_pass         http://backend;
        proxy_read_timeout 120s;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
      }
    }

    # ── Object storage routes → MinIO ─────────────────────────
    location /storage/ {
      proxy_pass         http://minio/;
      proxy_http_version 1.1;
      proxy_set_header   Host              minio:9000;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;

      # Strip /storage prefix before forwarding
      rewrite ^/storage/(.*) /$1 break;
    }

    # ── Frontend / UI ─────────────────────────────────────────
    # In production, serve static build. In dev, proxy to Vite.
    location / {
      # Switch to: proxy_pass http://frontend:5173; if frontend is containerized
      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;

      # CORS headers for local dev
      add_header Access-Control-Allow-Origin *;
    }

    # ── Health check for nginx itself ─────────────────────────
    location /nginx-health {
      access_log off;
      return 200 '{"status":"ok","service":"nginx"}';
      add_header Content-Type application/json;
    }
  }
}